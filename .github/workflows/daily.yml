name: Daily ΦΕΚ ingest

on:
  schedule:
    # 05:00 UTC ≈ 08:00 ώρα Ελλάδας. (Το GitHub cron είναι best-effort — μπορεί
    # να καθυστερήσει λίγα λεπτά.)
    - cron: "0 5 * * *"
  workflow_dispatch: {}   # χειροκίνητη εκτέλεση από την καρτέλα Actions

permissions:
  contents: write          # για να κάνει commit το ενημερωμένο records.json

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Self-test (classification + corpora)
        run: python -m ingester.selftest

      - name: Run ingester
        env:
          # Προαιρετικό: πρόσθεσε secret GEMINI_API_KEY στο repo για το AI layer.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m ingester.run

      - name: Commit updated data
        run: |
          git config user.name "fek-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "Δεν υπάρχουν αλλαγές σήμερα."
          else
            git commit -m "data: ημερήσια ενημέρωση ΦΕΚ $(date -u +%Y-%m-%d)"
            git push
          fi
