name = "fek-paideias-synth"
main = "worker.js"
compatibility_date = "2026-01-01"
workers_dev = true

# Secret (do NOT put it here — set it hidden):
#   npx wrangler secret put GEMINI_API_KEY
#
# After deploy, set this to your GitHub Pages origin, for example:
#   ALLOWED_ORIGINS = "https://<user>.github.io"
# Empty is intentionally blocked by worker.js. For temporary local/dev tests only,
# set ALLOW_ANY_ORIGIN = "1".
# ENVIRONMENT: "production" (default) requires ALLOWED_ORIGINS; "development"
# also allows http://localhost:3000 and http://127.0.0.1:3000 automatically.
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = ""
MAX_REQUESTS_PER_MINUTE = "12"
